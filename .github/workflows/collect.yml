name: collect

on: 
  push:
    branches: 
      - direct_link

  workflow_dispatch:

  schedule:
    - cron: "0 4 * * *"

jobs:
  collect:
    permissions:                   
      contents: write              
      pull-requests: write          

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - run: pip install -r python/requirements.txt
      - run: pip install selenium webdriver-manager bs4 pyperclip tqdm beautifulsoup4

      - name: Collect
        run: |
          cd python && python collect.py

      # ✅ 还原：只有前面成功才会执行（collect.py 报错时，此步不会运行）
      - name: Commit && Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output
          git diff-index --quiet HEAD output || git commit -m "feat: update collect"
          git push
          # 拉取 main 分支（解决错误！）
          git fetch origin main:main
          git checkout main

          # 从当前分支覆盖 output 到 main
          git checkout ${{ github.ref_name }} -- output/
          git commit -m "sync: update output files" || true
          git push origin main
